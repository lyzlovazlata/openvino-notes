name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  JAVA_VERSION: "17"

jobs:
  detect-gradle:
    name: Detect Gradle Project
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_gradle: ${{ steps.detect.outputs.has_gradle }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Gradle files
        id: detect
        shell: bash
        run: |
          if [ -f gradlew ] || [ -f build.gradle.kts ] || [ -f build.gradle ] || [ -f settings.gradle.kts ] || [ -f settings.gradle ]; then
            echo "has_gradle=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_gradle=false" >> "$GITHUB_OUTPUT"
          fi

  quality:
    name: Quality
    needs: detect-gradle
    if: needs.detect-gradle.outputs.has_gradle == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK packages
        shell: bash
        run: |
          SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "${SDKMANAGER}" ]; then
            SDKMANAGER="$(command -v sdkmanager)"
          fi

          yes | "${SDKMANAGER}" --licenses >/dev/null
          "${SDKMANAGER}" "platforms;android-${ANDROID_API_LEVEL}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Quality gates
        run: |
          ./gradlew \
            assembleDebug \
            ktlintCheck \
            detekt \
            lintDebug \
            testDebugUnitTest \
            koverXmlReport \
            koverVerify \
            --stacktrace

      - name: Merge detekt SARIF
        if: always()
        shell: bash
        run: |
          mkdir -p build/reports/detekt
          mapfile -t sarif_files < <(find . -path '*/build/reports/detekt/*.sarif' -type f | sort)

          if [ "${#sarif_files[@]}" -eq 0 ]; then
            exit 0
          fi

          jq -s '{
            version: (.[0].version // "2.1.0"),
            "$schema": (.[0]."$schema"),
            runs: (map(.runs // []) | add)
          }' "${sarif_files[@]}" > build/reports/detekt/detekt-merged.sarif

      - name: Upload detekt SARIF
        if: always() && hashFiles('build/reports/detekt/detekt-merged.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: build/reports/detekt/detekt-merged.sarif
          category: detekt

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          if-no-files-found: ignore
          path: |
            **/build/reports/kover/**
            **/build/reports/detekt/**
            **/build/reports/ktlint/**
            **/build/reports/lint-results-*.html
            **/build/reports/lint-results-*.xml

  secrets:
    name: Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        shell: bash
        run: |
          mkdir -p build/reports/gitleaks
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect \
            --source . \
            --report-format sarif \
            --report-path build/reports/gitleaks/gitleaks.sarif \
            --redact

      - name: Upload gitleaks SARIF
        if: always() && hashFiles('build/reports/gitleaks/gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: build/reports/gitleaks/gitleaks.sarif
          category: gitleaks

      - name: Upload secrets artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-reports
          if-no-files-found: ignore
          path: build/reports/gitleaks/**

  codeql:
    name: CodeQL
    needs: detect-gradle
    if: needs.detect-gradle.outputs.has_gradle == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK packages
        shell: bash
        run: |
          SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "${SDKMANAGER}" ]; then
            SDKMANAGER="$(command -v sdkmanager)"
          fi

          yes | "${SDKMANAGER}" --licenses >/dev/null
          "${SDKMANAGER}" "platforms;android-${ANDROID_API_LEVEL}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build for CodeQL
        run: ./gradlew assembleDebug --stacktrace

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  release:
    name: Release
    needs: detect-gradle
    if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && needs.detect-gradle.outputs.has_gradle == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK packages
        shell: bash
        run: |
          SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "${SDKMANAGER}" ]; then
            SDKMANAGER="$(command -v sdkmanager)"
          fi

          yes | "${SDKMANAGER}" --licenses >/dev/null
          "${SDKMANAGER}" "platforms;android-${ANDROID_API_LEVEL}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Release checks
        run: |
          ./gradlew \
            assembleRelease \
            lintRelease \
            --stacktrace

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-reports
          if-no-files-found: ignore
          path: |
            **/build/reports/lint-results-*.html
            **/build/reports/lint-results-*.xml

  android-tests:
    name: Android Tests
    needs: detect-gradle
    if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && needs.detect-gradle.outputs.has_gradle == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Android SDK packages
        shell: bash
        run: |
          SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "${SDKMANAGER}" ]; then
            SDKMANAGER="$(command -v sdkmanager)"
          fi

          yes | "${SDKMANAGER}" --licenses >/dev/null
          "${SDKMANAGER}" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "system-images;android-34;aosp_atd;x86_64"

      - name: Managed device tests
        run: |
          ./gradlew \
            app:pixel7api34DebugAndroidTest \
            -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect \
            --stacktrace

      - name: Upload android test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          if-no-files-found: ignore
          path: |
            **/build/reports/androidTests/**
            **/build/outputs/androidTest-results/**
