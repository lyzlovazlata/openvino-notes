name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  JAVA_VERSION: "17"

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK packages
        shell: bash
        run: |
          SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "${SDKMANAGER}" ]; then
            SDKMANAGER="$(command -v sdkmanager)"
          fi

          yes | "${SDKMANAGER}" --licenses >/dev/null
          "${SDKMANAGER}" "platforms;android-${ANDROID_API_LEVEL}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Ensure wrapper is executable
        run: chmod +x gradlew

      - name: Ensure required quality tasks exist
        shell: bash
        run: |
          tasks="$(./gradlew tasks --all --console=plain)"

          for task in assembleDebug ktlintCheck detekt lintDebug testDebugUnitTest koverVerify; do
            if ! printf '%s\n' "${tasks}" | grep -Eq "^${task}( |$)"; then
              echo "Missing required Gradle task: ${task}"
              exit 1
            fi
          done

      - name: Quality gates
        run: |
          ./gradlew \
            assembleDebug \
            ktlintCheck \
            detekt \
            lintDebug \
            testDebugUnitTest \
            koverVerify \
            --stacktrace

  secrets:
    name: Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        shell: bash
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect \
            --source . \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --redact

      - name: Upload gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK packages
        shell: bash
        run: |
          SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "${SDKMANAGER}" ]; then
            SDKMANAGER="$(command -v sdkmanager)"
          fi

          yes | "${SDKMANAGER}" --licenses >/dev/null
          "${SDKMANAGER}" "platforms;android-${ANDROID_API_LEVEL}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Ensure wrapper is executable
        run: chmod +x gradlew

      - name: Build for CodeQL
        run: ./gradlew assembleDebug --stacktrace

      - name: Analyze
        uses: github/codeql-action/analyze@v3
